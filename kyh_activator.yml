name: 🚀 KYH One-Click Activator
on:
  workflow_dispatch:
    inputs:
      first_name:
        description: 'First Name (Taylor)'
        required: true
        default: 'Taylor'
      last_name:
        description: 'Last Name (X)'
        required: true
        default: '✖️'
      email:
        description: 'Email (Without @gmail.com)'
        required: true
      password:
        description: 'Password'
        required: true

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup System Environment
        run: |
          pip install playwright
          playwright install chromium
      
      - name: ⚡ Firing The Injection (60s Execution)
        run: |
          python -c "
          import asyncio
          from playwright.async_api import async_playwright
          
          async def run():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  print('🚀 [KYH] Targeting Google Signup...')
                  await page.goto('https://accounts.google.com/signup')
                  
                  # حقن البيانات المباشر
                  await page.fill('input[name=\"firstName\"]', '${{ github.event.inputs.first_name }}')
                  await page.fill('input[name=\"lastName\"]', '${{ github.event.inputs.last_name }}')
                  await page.fill('input[name=\"Username\"]', '${{ github.event.inputs.email }}')
                  await page.fill('input[name=\"Passwd\"]', '${{ github.event.inputs.password }}')
                  await page.fill('input[name=\"ConfirmPasswd\"]', '${{ github.event.inputs.password }}')
                  
                  await page.click('button:has-text(\"Next\")')
                  print('⏳ Waiting 60s for Cloud Sync...')
                  await asyncio.sleep(60)
                  print('✅ [Matrix-Jo] Account ${{ github.event.inputs.email }} is ACTIVE!')
                  await browser.close()
          
          asyncio.run(run())
          "
